<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <p class="eyebrow">EduMonitor AI</p>
            <h1>Student Login</h1>
            <p class="muted">Continue learning, reading PDFs, and taking AI quizzes.</p>

            <form method="post" class="form">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>

                <button type="submit">Login</button>
            </form>

            <p class="auth-link">New user? <a href="/register">Register here</a></p>
            <p class="auth-link small"><a href="/">Back to home</a></p>
        </section>
    </main>
</body>
</html>
